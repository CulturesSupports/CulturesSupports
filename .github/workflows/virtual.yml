vagrant:
  vm:
    box: "ubuntu/bionic64"
    hostname: "my-virtual-machine"
    network:
      type: "private_network"
      ip: "192.168.33.10"
    synced_folder:
      host_path: "./host_folder"
      guest_path: "/home/vagrant/guest_folder"
    provision:
      type: "shell"
      inline: "sudo apt-get update && sudo apt-get install -y nginx"
