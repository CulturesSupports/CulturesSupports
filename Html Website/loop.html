
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRM Style Blog </title>
  <!-- Add Bootstrap CSS -->
  <link href="css/bootstrap.min.css" rel="stylesheet">
  <!-- Add Microsoft Fluent Design System CSS -->
  <link rel="stylesheet" href="https://static2.sharepointonline.com/files/fabric/office-ui-fabric-core/9.0.0/css/fabric.min.css">
  <link rel="stylesheet" href="https://static2.sharepointonline.com/files/fabric/office-ui-fabric-core/9.0.0/css/fabric.components.min.css">

<link rel="stylesheet" href="https://static2.sharepointonline.com/files/fabric/office-ui-fabric-core/9.0.0/css/fabric.min.css">
<link rel="stylesheet" href="https://static2.sharepointonline.com/files/fabric/office-ui-fabric-core/9.0.0/css/fabric.components.min.css">
  
</head>
<body>

  <div class="container-fluid p-0">
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">CRM Blog</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="#">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#posts">Posts</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container my-5">
      <h1 class="text-center mb-4">Welcome to the CRM Blog</h1>
      <div class="row">
        <div class="col-md-8">
          <div id="posts">
            <div class="ms-MessageCell-wrapper ms-MessageCell-wrapper--isSelectable ms-MessageCell-wrapper--isPrimary ms-MessageCell-wrapper--isUnread" tabindex="0">
              <div class="ms-MessageCell ms-MessageCell--isUnread">
                <div class="ms-MessageCell-content">
                  <div class="ms-MessageCell-name">
                    <strong>Post Title 1</strong>
                    <span class="ms-MessageCell-activity">by John Doe</span>
                  </div>
                  <div class="ms-MessageCell-subject">
                    <div class="ms-MessageCell-subjectFallback">This is a sample post about CRM and its benefits.</div>
                  </div>
                  <div class="ms-MessageCell-activityDate">Mar 21, 2022</div>
                </div>
              </div>
            </div>
            <!-- Add more posts here -->
          </div>
        </div>
        <div class="col-md-4">
          <div class="card">
            <div class="card-body">
              <h5 class="card-title">About</h5>
              <p class="card-text">This is a simple CRM-style blog using Bootstrap and the Microsoft Fluent Design System.</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Add Bootstrap JS and jQuery -->
  <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
  <script src="js/bootstrap.bundle.min.js"></script>
  <!-- Add Microsoft Fluent Design System JS -->
  <script src="https://static2.sharepointonline.com/files/fabric/office-ui-fabric-core/9.0.0/js/fabric.min.js"></script>
</body>
</html>
